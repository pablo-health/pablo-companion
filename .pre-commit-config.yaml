repos:
  # File hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=500]

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # Swift linting and formatting (requires swiftlint + swiftformat installed locally)
  - repo: local
    hooks:
      - id: swiftlint
        name: SwiftLint
        entry: swiftlint lint --strict --config mac/.swiftlint.yml
        language: system
        files: \.swift$
        pass_filenames: false

      - id: swiftformat
        name: SwiftFormat
        entry: swiftformat --lint --config mac/.swiftformat
        language: system
        files: \.swift$
        pass_filenames: false

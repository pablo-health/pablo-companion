				"$(SRCROOT)/../core/target/debug/libpablo_core.dylib",
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -euo pipefail\n\nCARGO=\"$HOME/.cargo/bin/cargo\"\nMANIFEST=\"$SRCROOT/../core/Cargo.toml\"\nDYLIB=\"libpablo_core.dylib\"\n\n# Skip the full Rust build when running under CodeQL.\n# CodeQL's tracer (DYLD_INSERT_LIBRARIES=libtrace.dylib) intercepts all\n# compiler calls and changes the target arch, breaking whisper.cpp's cmake.\n# CodeQL only needs Swift ASTs, not the Rust dylib. Create a stub so the\n# build phase succeeds and Swift compilation can proceed.\nif [ -n \"${CODEQL_TRACER_LOG:-}\" ]; then\n    echo \"CodeQL detected -- creating stub dylib, skipping Rust build\"\n    mkdir -p \"$(dirname \"$SRCROOT/../core/target/debug/$DYLIB\")\"\n    echo \"void __pablo_core_codeql_stub(void){}\" | \\\n        cc -dynamiclib -o \"$SRCROOT/../core/target/debug/$DYLIB\" -x c - \\\n        -install_name \"@rpath/$DYLIB\" 2>/dev/null || \\\n        touch \"$SRCROOT/../core/target/debug/$DYLIB\"\n    exit 0\nfi\n\n# Use the real system compiler path explicitly.\nexport CC=$(xcrun -find cc)\nexport CXX=$(xcrun -find c++)\n\n# Suppress CMake developer warnings (CMP0065, CMP0066 policy warnings).\nexport CMAKE_SUPPRESS_DEVELOPER_WARNINGS=TRUE\n\nif [ \"$CONFIGURATION\" = \"Release\" ]; then\n    PROFILE=\"--release\"\n    NATIVE_DIR=\"$SRCROOT/../core/target/release\"\n    CROSS_DIR=\"$SRCROOT/../core/target/x86_64-apple-darwin/release\"\nelse\n    PROFILE=\"\"\n    NATIVE_DIR=\"$SRCROOT/../core/target/debug\"\n    CROSS_DIR=\"$SRCROOT/../core/target/x86_64-apple-darwin/debug\"\nfi\n\n# Detect actual hardware architecture, reliable regardless of CI tool wrappers.\nHARDWARE_ARCH=$(uname -m)\n\n# Cross-compile only when arm64 hardware needs to also produce an x86_64 slice.\nif [ \"$HARDWARE_ARCH\" = \"arm64\" ] && echo \"$ARCHS\" | grep -qw \"x86_64\"; then\n    rustup target add x86_64-apple-darwin 2>/dev/null || true\n    \"$CARGO\" build --manifest-path \"$MANIFEST\" $PROFILE\n    \"$CARGO\" build --manifest-path \"$MANIFEST\" --target x86_64-apple-darwin $PROFILE\n    lipo -create \"$NATIVE_DIR/$DYLIB\" \"$CROSS_DIR/$DYLIB\" -output \"$NATIVE_DIR/$DYLIB\"\nelse\n    \"$CARGO\" build --manifest-path \"$MANIFEST\" $PROFILE\nfi\n";
		};

version: 2

updates:
  # Swift (SPM — mac/)
  - package-ecosystem: swift
    directory: /mac
    schedule:
      interval: weekly
      day: monday

  # NuGet (.NET — windows/)
  - package-ecosystem: nuget
    directory: /windows
    schedule:
      interval: weekly
      day: monday

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
    groups:
      actions:
        patterns:
          - "*"

name: Rust Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 2" # Tuesday 7AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect Rust changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # Always run on push/schedule; on PRs only run if Rust files changed
      rust: ${{ github.event_name != 'pull_request' || steps.filter.outputs.rust == 'true' }}
      has-cargo: ${{ steps.cargo-check.outputs.exists }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            rust:
              - 'core/**'
      - name: Check for core/Cargo.toml
        id: cargo-check
        run: |
          if [ -f core/Cargo.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  cargo-audit:
    name: cargo audit
    needs: changes
    if: needs.changes.outputs.rust == 'true' && needs.changes.outputs.has-cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: core

  cargo-deny:
    name: cargo deny
    needs: changes
    if: needs.changes.outputs.rust == 'true' && needs.changes.outputs.has-cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          manifest-path: core/Cargo.toml

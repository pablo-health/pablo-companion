name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      windows: ${{ github.event_name == 'push' || steps.filter.outputs.windows }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            windows:
              - 'windows/**'
              - '.github/workflows/windows.yml'

  build-and-test:
    name: Build and Test
    needs: changes
    if: needs.changes.outputs.windows == 'true'
    runs-on: windows-latest

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout AudioCaptureKit (sibling repo for project reference)
        run: git clone --depth 1 https://github.com/pablo-health/AudioCaptureKit.git ../AudioCaptureKit

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages (with vulnerability audit)
        run: dotnet restore windows/PabloCompanion.sln /p:NuGetAudit=true /p:NuGetAuditLevel=moderate

      - name: Install Windows App Runtime framework
        # The main project went framework-dependent for MSIX, so its build output
        # no longer bundles WinAppSDK runtime DLLs. The test project transitively
        # loses them too, and unpackaged vstest fails to COM-activate WinAppSDK
        # types ("Class not registered"). Install the framework system-wide so
        # the auto-initializer's bootstrap call succeeds.
        shell: pwsh
        run: |
          $installer = Get-ChildItem $env:USERPROFILE\.nuget\packages\microsoft.windowsappsdk\*\tools\WindowsAppRuntimeInstall-x64.exe -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $installer) {
            Write-Host "Installer not in NuGet cache; downloading from aka.ms..."
            $url = 'https://aka.ms/windowsappsdk/1.8/latest/windowsappruntimeinstall-x64.exe'
            $tmp = Join-Path $env:RUNNER_TEMP 'WindowsAppRuntimeInstall-x64.exe'
            Invoke-WebRequest -Uri $url -OutFile $tmp -UseBasicParsing
            $installer = Get-Item $tmp
          }
          Write-Host "Running: $($installer.FullName)"
          & $installer.FullName --quiet
          if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 3010) {
            throw "WindowsAppRuntimeInstall failed with exit code $LASTEXITCODE"
          }

      - name: Check C# formatting
        run: dotnet format windows/PabloCompanion.sln --verify-no-changes --verbosity diagnostic

      - name: Build Windows app
        run: dotnet build windows/PabloCompanion/PabloCompanion.csproj -c Debug -p:Platform=x64 --no-restore

      - name: Build tests
        run: dotnet build windows/PabloCompanion.Tests/PabloCompanion.Tests.csproj -c Debug -p:Platform=x64 --no-restore

      - name: Run tests
        run: dotnet test windows/PabloCompanion.Tests/PabloCompanion.Tests.csproj --no-build -c Debug -p:Platform=x64

  gate:
    name: Windows CI
    needs: [changes, build-and-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify Windows CI result
        run: |
          changed="${{ needs.changes.outputs.windows }}"
          result="${{ needs.build-and-test.result }}"
          echo "windows changed: $changed"
          echo "build-and-test result: $result"
          if [ "$changed" = "true" ] && [ "$result" != "success" ]; then
            echo "::error::Windows code changed and build-and-test did not succeed ($result)"
            exit 1
          fi
          echo "Gate passed"

name: Windows CI

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
  pull_request:
    paths:
      - 'windows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout AudioCaptureKit (sibling repo for project reference)
        run: git clone --depth 1 https://github.com/pablo-health/AudioCaptureKit.git ../AudioCaptureKit

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages (with vulnerability audit)
        run: dotnet restore windows/PabloCompanion.sln /p:NuGetAudit=true /p:NuGetAuditLevel=moderate

      - name: Check C# formatting
        run: dotnet format windows/PabloCompanion.sln --verify-no-changes --verbosity diagnostic

      - name: Build Windows app
        run: dotnet build windows/PabloCompanion/PabloCompanion.csproj -c Debug -p:Platform=x64 --no-restore

      - name: Build tests
        run: dotnet build windows/PabloCompanion.Tests/PabloCompanion.Tests.csproj -c Debug -p:Platform=x64 --no-restore

      - name: Run tests
        run: dotnet test windows/PabloCompanion.Tests/PabloCompanion.Tests.csproj --no-build -c Debug -p:Platform=x64

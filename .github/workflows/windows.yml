name: Windows CI

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - 'core/**'
  pull_request:
    paths:
      - 'windows/**'
      - 'core/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6

      - name: Checkout AudioCaptureKit (sibling repo for project reference)
        run: git clone --depth 1 https://github.com/pablo-health/AudioCaptureKit.git ../AudioCaptureKit

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('core/Cargo.lock') }}

      - name: Build Rust core (no transcription)
        run: cargo build --manifest-path core/Cargo.toml --no-default-features

      - name: Test Rust core (no transcription)
        run: cargo test --manifest-path core/Cargo.toml --no-default-features

      - name: Copy DLL to project
        run: |
          New-Item -ItemType Directory -Path windows/PabloCompanion/Native -Force
          Copy-Item core/target/debug/pablo_core.dll windows/PabloCompanion/Native/

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages (with vulnerability audit)
        run: dotnet restore windows/PabloCompanion.sln /p:NuGetAudit=true /p:NuGetAuditLevel=moderate

      - name: Check C# formatting
        run: dotnet format windows/PabloCompanion.sln --verify-no-changes --verbosity diagnostic

      - name: Build Windows app
        run: dotnet build windows/PabloCompanion/PabloCompanion.csproj -c Debug -p:Platform=x64 --no-restore

      - name: Build tests
        run: dotnet build windows/PabloCompanion.Tests/PabloCompanion.Tests.csproj -c Debug -p:Platform=x64 --no-restore

      - name: Run tests
        run: dotnet test windows/PabloCompanion.Tests/PabloCompanion.Tests.csproj --no-build -c Debug -p:Platform=x64

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 3" # Wednesday 8AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # Always run on push/schedule; on PRs only run if relevant files changed
      swift: ${{ github.event_name != 'pull_request' || steps.filter.outputs.swift == 'true' }}
      csharp: ${{ github.event_name != 'pull_request' || steps.filter.outputs.csharp == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            swift:
              - 'mac/**'
            csharp:
              - 'windows/**'

  analyze-swift:
    name: CodeQL (swift)
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          languages: swift
          queries: security-extended

      - name: Cache SPM dependencies
        id: spm-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: mac/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('mac/PabloCompanion.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        # The Rust build phase is skipped under CodeQL (stub dylib created
        # instead) so the link step may fail with missing symbols. That's
        # fine — CodeQL only needs Swift ASTs from the compilation step.
        continue-on-error: true
        run: |
          DISABLE_PKGS=${{ steps.spm-cache.outputs.cache-hit == 'true' && '-disableAutomaticPackageResolution' || '' }}
          xcodebuild -project mac/PabloCompanion.xcodeproj \
            -scheme Pablo \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath mac/SourcePackages \
            $DISABLE_PKGS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          category: /language:swift

  analyze-csharp:
    name: CodeQL (csharp)
    needs: changes
    if: needs.changes.outputs.csharp == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust core (stub for linking)
        run: cargo build --manifest-path core/Cargo.toml --no-default-features

      - name: Copy DLL
        run: |
          New-Item -ItemType Directory -Path windows/PabloCompanion/Native -Force
          Copy-Item core/target/debug/pablo_core.dll windows/PabloCompanion/Native/

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          languages: csharp
          queries: security-extended

      - name: Build
        # CodeQL only needs C# ASTs from the compilation step.
        # WinUI XAML compilation or linking may fail under CodeQL
        # instrumentation — that's fine, same as the Swift job.
        continue-on-error: true
        shell: pwsh
        run: |
          dotnet restore windows/PabloCompanion.sln
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe"
          & $msbuild windows/PabloCompanion/PabloCompanion.csproj /t:Build /p:Configuration=Debug /p:Platform=x64 /verbosity:minimal

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          category: /language:csharp

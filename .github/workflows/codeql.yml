name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 3" # Wednesday 8AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # Always run on push/schedule; on PRs only run if relevant files changed
      swift: ${{ github.event_name != 'pull_request' || steps.filter.outputs.swift == 'true' }}
      csharp: ${{ github.event_name != 'pull_request' || steps.filter.outputs.csharp == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            swift:
              - 'mac/**'
            csharp:
              - 'windows/**'

  analyze-swift:
    name: CodeQL (swift)
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: swift
          queries: security-extended

      - name: Cache SPM dependencies
        id: spm-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: mac/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('mac/PabloCompanion.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        # The Rust build phase is skipped under CodeQL (stub dylib created
        # instead) so the link step may fail with missing symbols. That's
        # fine — CodeQL only needs Swift ASTs from the compilation step.
        continue-on-error: true
        run: |
          DISABLE_PKGS=${{ steps.spm-cache.outputs.cache-hit == 'true' && '-disableAutomaticPackageResolution' || '' }}
          xcodebuild -project mac/PabloCompanion.xcodeproj \
            -scheme Pablo \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath mac/SourcePackages \
            $DISABLE_PKGS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:swift

  analyze-csharp:
    name: CodeQL (csharp)
    needs: changes
    if: needs.changes.outputs.csharp == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Checkout AudioCaptureKit (sibling repo for project reference)
        run: git clone --depth 1 https://github.com/pablo-health/AudioCaptureKit.git ../AudioCaptureKit

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: csharp
          queries: security-extended

      - name: Build
        # CodeQL only needs C# ASTs from the compilation step.
        # WinUI XAML compilation or linking may fail under CodeQL
        # instrumentation — that's fine, same as the Swift job.
        continue-on-error: true
        run: |
          dotnet restore windows/PabloCompanion.sln
          dotnet build windows/PabloCompanion/PabloCompanion.csproj -c Debug -p:Platform=x64 --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:csharp

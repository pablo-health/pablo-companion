name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      mac: ${{ github.event_name == 'push' || steps.filter.outputs.mac }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            mac:
              - 'mac/**'

  swift-lint:
    name: Swift Lint
    needs: changes
    if: needs.changes.outputs.mac == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install SwiftLint
        run: |
          SWIFTLINT_VERSION=0.63.2
          curl -sL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip" -o swiftlint.zip
          unzip -q swiftlint.zip -d swiftlint
          echo "$PWD/swiftlint" >> "$GITHUB_PATH"

      - name: Install SwiftFormat
        run: |
          SWIFTFORMAT_VERSION=0.59.1
          curl -sL "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip" -o swiftformat.zip
          unzip -q swiftformat.zip
          chmod +x swiftformat
          echo "$PWD" >> "$GITHUB_PATH"

      - name: SwiftLint
        run: swiftlint lint --strict --config mac/.swiftlint.yml mac/PabloCompanion/

      - name: SwiftFormat
        run: swiftformat --lint --config mac/.swiftformat mac/PabloCompanion/

  swift-test:
    name: Swift Build & Test
    needs: [changes, swift-lint]
    if: needs.changes.outputs.mac == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache SPM dependencies
        id: spm-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: mac/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('mac/PabloCompanion.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build & Test
        run: |
          DISABLE_PKGS=${{ steps.spm-cache.outputs.cache-hit == 'true' && '-disableAutomaticPackageResolution' || '' }}
          xcodebuild -project mac/PabloCompanion.xcodeproj \
            -scheme Pablo \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath mac/SourcePackages \
            $DISABLE_PKGS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test | xcpretty

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  gate:
    name: CI
    needs: [changes, swift-lint, swift-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI result
        run: |
          changed="${{ needs.changes.outputs.mac }}"
          lint="${{ needs.swift-lint.result }}"
          test="${{ needs.swift-test.result }}"
          echo "mac changed: $changed"
          echo "swift-lint result: $lint"
          echo "swift-test result: $test"
          if [ "$changed" = "true" ]; then
            if [ "$lint" != "success" ]; then
              echo "::error::mac code changed and swift-lint did not succeed ($lint)"
              exit 1
            fi
            if [ "$test" != "success" ]; then
              echo "::error::mac code changed and swift-test did not succeed ($test)"
              exit 1
            fi
          fi
          echo "Gate passed"

# cargo deny configuration for pablo-core
# https://embarkstudios.github.io/cargo-deny/

[licenses]
# Explicitly allowed licenses.
# All transitive dependencies must use one or more of these.
#
# MPL-2.0 note: UniFFI (our FFI code generator) is MPL-2.0.
# MPL-2.0 is file-level copyleft: modifications to UniFFI source files must
# be shared, but our application code is unaffected. This is well-understood
# and widely used in commercial software (Firefox, Thunderbird, etc.).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "Unlicense",
]
# Reject copyleft licenses that would affect application code.
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
]

[advisories]
# Deny crates with known security vulnerabilities.
version = 2

[bans]
# Prevent multiple versions of the same crate where possible.
multiple-versions = "warn"

[sources]
# Only allow crates from crates.io and our own git repos.
unknown-registry = "deny"
unknown-git = "deny"
